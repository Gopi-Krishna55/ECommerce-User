
# ===============================
# Application
# ===============================
spring.application.name=ecommerce-user-service
server.port=8080

# ===============================
# Datasource
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_user_db
spring.datasource.username=postgres
spring.datasource.password= ${password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Default schema (important for your @Table schema)
spring.jpa.properties.hibernate.default_schema=ecommerce_user

# ===============================
# HikariCP
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# ===============================
# Swagger
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===============================
# JWT
# ===============================
jwt.secret=my-secret-key-my-secret-key-my-secret-key-12345
jwt.expiration=900000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=&{your_app_email}
spring.mail.password=${your_app_email_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

//kafka props

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=otp-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

